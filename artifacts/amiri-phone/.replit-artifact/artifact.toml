kind = "web"
previewPath = "/"
title = "Amiri Phone - Mobile Store"
version = "1.0.0"
id = "artifacts/amiri-phone"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18251
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/amiri-phone run dev"

[services.env]
PORT = "18251"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/amiri-phone", "run", "build"]
publicDir = "artifacts/amiri-phone/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
